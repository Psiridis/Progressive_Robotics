services:
  ros2:
    build:
      context: .
      dockerfile: Dockerfile
    image: progressive-robotics:humble
    container_name: progressive_robotics_ros2
    working_dir: /ros2_ws
    volumes:
      - ./src:/ros2_ws/src
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=host.docker.internal:0
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
